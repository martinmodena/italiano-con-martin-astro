name: Publish HTML site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static HTML site
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          cp -R legacy-html/. dist/
          find dist -name '.gitkeep' -delete
          rm -f dist/assets/martin-portrait.png
          rm -f dist/assets/cane-osso-realistica.jpg
          rm -f dist/assets/story-cane-osso-home.webp
          rm -f dist/assets/story-cane-osso.jpg
          rm -f dist/assets/story-cicala-formica.jpg
          rm -f dist/assets/story-leone-topo.jpg
          rm -f dist/assets/story-lepre-tartaruga.jpg
          rm -f dist/assets/story-lupo-tre-porcellini.jpg
          rm -f dist/assets/story-mugnaio-figlio-asino.jpg
          rm -f dist/assets/story-pastorello.jpg
          rm -f dist/assets/story-topo-citta-campagna.jpg
          rm -f dist/assets/story-volpe-uva.jpg

      - name: Upload only static site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
