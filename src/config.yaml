site:
  name: Astro Pages Site
  site: 'https://example.github.io'
  base: '/'
  trailingSlash: true

  googleSiteVerificationId:

metadata:
  title:
    default: Astro Pages Site
    template: '%s - Astro Pages Site'
  description: 'Sito statico migrato in Astro con template AstroWind e deploy su GitHub Pages.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Astro Pages Site
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: ''
    site: ''
    cardType: summary_large_image

i18n:
  language: it
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
